name: FightIQ UFCStats Sync

on:
  workflow_dispatch:
    inputs:
      upload_to_supabase:
        description: "Upload data to Supabase"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_events:
        description: "Max events to scrape"
        required: false
        default: "5"
      max_fighters:
        description: "Max fighter detail pages"
        required: false
        default: "20"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FightIQ scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIGHTIQ_UPLOAD_TO_SUPABASE: ${{ github.event.inputs.upload_to_supabase }}
          FIGHTIQ_MAX_EVENTS: ${{ github.event.inputs.max_events }}
          FIGHTIQ_MAX_FIGHTERS: ${{ github.event.inputs.max_fighters }}
        run: python main.py

      - name: Upload CSV exports
        uses: actions/upload-artifact@v4
        with:
          name: fightiq-exports
          path: exports/
